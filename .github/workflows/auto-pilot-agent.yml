name: Auto-Pilot Agent

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-pilot:
    name: Autonomous Maintainer
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.email "auto-pilot[bot]@users.noreply.github.com"
          git config --global user.name "auto-pilot[bot]"

      # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # STEP 1 ‚Äì Sync all open branches with main
      # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Sync open branches with main
        run: |
          echo "## Syncing open PR branches with main" >> "$GITHUB_STEP_SUMMARY"

          # Collect the head-ref of every open PR
          PR_BRANCHES=$(gh pr list \
            --repo "$REPO" \
            --state open \
            --json headRefName \
            --jq '.[].headRefName')

          if [ -z "$PR_BRANCHES" ]; then
            echo "No open PRs found ‚Äì nothing to sync." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          for BRANCH in $PR_BRANCHES; do
            echo "Syncing branch: $BRANCH"
            git fetch origin "$BRANCH" 2>/dev/null || { echo "  WARNING: could not fetch $BRANCH, skipping."; continue; }
            git checkout "$BRANCH"
            if git rebase origin/main; then
              git push --force-with-lease origin "$BRANCH"
              echo "  ‚úÖ $BRANCH rebased onto main and pushed." | tee -a "$GITHUB_STEP_SUMMARY"
            else
              echo "  ‚öÝÔ∏è  Rebase of $BRANCH onto main failed ‚Äì aborting rebase."
              git rebase --abort || true
            fi
            git checkout main
          done

      # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # STEP 2 ‚Äì Process issues labelled 'automated-fix'
      # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Process automated-fix issues
        run: |
          echo "## Processing 'automated-fix' issues" >> "$GITHUB_STEP_SUMMARY"

          ISSUES=$(gh issue list \
            --repo "$REPO" \
            --state open \
            --label "automated-fix" \
            --json number,title,body \
            --jq '.[]')

          if [ -z "$ISSUES" ]; then
            echo "No issues labelled 'automated-fix' found." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "$ISSUES" | jq -c '.' | while read -r ISSUE; do
            NUMBER=$(echo "$ISSUE" | jq -r '.number')
            TITLE=$(echo "$ISSUE"  | jq -r '.title')
            BODY=$(echo "$ISSUE"   | jq -r '.body')

            BRANCH="automated-fix/issue-${NUMBER}"

            # Skip if a PR already exists for this branch
            EXISTING_PR=$(gh pr list \
              --repo "$REPO" \
              --head "$BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$EXISTING_PR" ]; then
              echo "  Issue #${NUMBER}: PR #${EXISTING_PR} already open ‚Äì skipping." \
                | tee -a "$GITHUB_STEP_SUMMARY"
              continue
            fi

            echo "  Generating fix suggestion for issue #${NUMBER}: $TITLE"

            # Create or reset the branch to the tip of main
            if git ls-remote --exit-code --heads origin "$BRANCH" &>/dev/null; then
              git checkout "$BRANCH"
              git rebase origin/main || { git rebase --abort || true; git checkout main; continue; }
            else
              git checkout -b "$BRANCH" origin/main
            fi

            # Use GitHub Copilot CLI to suggest a fix based on the issue body.
            # The suggestion is written to a file for human review ‚Äì it is NOT
            # executed directly to avoid running untrusted AI-generated commands.
            SUGGESTION_FILE="copilot-suggestion-issue-${NUMBER}.md"
            PROMPT="Provide a minimal code fix suggestion for the following GitHub issue.
Issue title: $TITLE
Issue body: $BODY
Describe the changes needed with file paths and diff snippets."

            SUGGESTION=$(echo "$PROMPT" | gh copilot suggest -t shell 2>/dev/null || true)

            {
              echo "# Copilot fix suggestion for issue #${NUMBER}"
              echo ""
              echo "**Issue:** $TITLE"
              echo ""
              if [ -n "$SUGGESTION" ]; then
                echo "## Suggested changes"
                echo ""
                echo "$SUGGESTION"
              else
                echo "No automated suggestion was generated. Please implement a fix manually."
              fi
            } > "$SUGGESTION_FILE"

            git add "$SUGGESTION_FILE"

            # Only create a PR if there are staged changes or new commits on the branch
            STAGED=$(git diff --cached --name-only)
            NEW_COMMITS=$(git rev-list "origin/main..${BRANCH}" --count 2>/dev/null || echo 0)

            if [ -z "$STAGED" ] && [ "$NEW_COMMITS" -eq 0 ]; then
              echo "  No changes for issue #${NUMBER} ‚Äì skipping PR." \
                | tee -a "$GITHUB_STEP_SUMMARY"
              git checkout main
              continue
            fi

            git commit -m "fix: automated fix suggestion for issue #${NUMBER} ‚Äì $TITLE"
            git push origin "$BRANCH"

            PR_URL=$(gh pr create \
              --repo "$REPO" \
              --title "fix: automated fix for issue #${NUMBER} ‚Äì $TITLE" \
              --body "Closes #${NUMBER}

This PR was automatically generated by the auto-pilot agent in response to the \`automated-fix\` label.

A Copilot fix suggestion has been committed to \`$SUGGESTION_FILE\`. Please review it, apply the changes, and push before merging." \
              --base main \
              --head "$BRANCH")

            echo "  ‚úÖ Created PR: $PR_URL" | tee -a "$GITHUB_STEP_SUMMARY"
            git checkout main
          done

      # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # STEP 3 ‚Äì Manage open Pull Requests
      # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Manage open Pull Requests
        run: |
          echo "## Managing open Pull Requests" >> "$GITHUB_STEP_SUMMARY"

          PRS=$(gh pr list \
            --repo "$REPO" \
            --state open \
            --json number,title,headRefName,mergeable,reviewDecision,statusCheckRollup \
            --jq '.[]')

          if [ -z "$PRS" ]; then
            echo "No open PRs found." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "$PRS" | jq -c '.' | while read -r PR; do
            PR_NUMBER=$(echo "$PR" | jq -r '.number')
            PR_TITLE=$(echo "$PR"  | jq -r '.title')
            BRANCH=$(echo "$PR"    | jq -r '.headRefName')
            MERGEABLE=$(echo "$PR" | jq -r '.mergeable')

            echo "--- PR #${PR_NUMBER}: $PR_TITLE (branch: $BRANCH) ---"

            # ‚îÄ‚îÄ 3a. Conflict resolution ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            if [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "  PR #${PR_NUMBER} has merge conflicts ‚Äì attempting rebase‚Ä¶"
              git fetch origin "$BRANCH" 2>/dev/null || true
              git checkout "$BRANCH"
              if git rebase origin/main; then
                git push --force-with-lease origin "$BRANCH"
                echo "  ‚úÖ Rebased $BRANCH onto main ‚Äì conflicts resolved." \
                  | tee -a "$GITHUB_STEP_SUMMARY"
              else
                git rebase --abort || true
                # Ask Copilot for a resolution hint (description only ‚Äì not executed)
                SUGGESTION=$(gh copilot suggest -t shell \
                  "How do I resolve merge conflicts when rebasing branch $BRANCH onto main?" \
                  2>/dev/null || true)

                COMMENT="‚öÝÔ∏è Auto-pilot: merge conflicts detected on \`$BRANCH\` and automatic rebase failed.

$([ -n "$SUGGESTION" ] && printf '**Copilot suggestion:**\n```\n%s\n```\n' "$SUGGESTION" \
  || echo "Please resolve conflicts manually and push the branch again.")

Human intervention required before this PR can be merged."

                gh pr comment "$PR_NUMBER" \
                  --repo "$REPO" \
                  --body "$COMMENT"
                echo "  ‚öÝÔ∏è  PR #${PR_NUMBER}: rebase failed ‚Äì comment left for human review." \
                  | tee -a "$GITHUB_STEP_SUMMARY"
              fi
              git checkout main
            fi

            # ‚îÄ‚îÄ 3b. Re-fetch PR state after possible rebase ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            PR_UPDATED=$(gh pr view "$PR_NUMBER" \
              --repo "$REPO" \
              --json number,mergeable,reviewDecision,statusCheckRollup 2>/dev/null)

            REVIEW=$(echo "$PR_UPDATED"       | jq -r '.reviewDecision // empty')
            CHECK_ROLLUP=$(echo "$PR_UPDATED" | jq -r '.statusCheckRollup // []')

            # ‚îÄ‚îÄ 3c. CI/CD safety check ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            # Block merge if any check has not yet reached SUCCESS.
            # A null conclusion means the check is still pending ‚Äì also blocked.
            FAILING_CHECKS=$(echo "$CHECK_ROLLUP" | \
              jq -r '.[] | select(.conclusion != "SUCCESS") | .name' \
              2>/dev/null || true)

            # Specifically require the backend / build-and-test job to be SUCCESS.
            BUILD_STATUS=$(echo "$CHECK_ROLLUP" | \
              jq -r '.[] | select(
                .name == "backend" or
                .name == "Backend Build & Test" or
                .name == "build-and-test"
              ) | .conclusion' \
              2>/dev/null | head -1)

            if [ -n "$FAILING_CHECKS" ]; then
              echo "  ‚õî PR #${PR_NUMBER}: CI checks not all passing ‚Äì skipping merge." \
                | tee -a "$GITHUB_STEP_SUMMARY"
              echo "     Not yet SUCCESS: $FAILING_CHECKS"
              continue
            fi

            # If the backend job was found but is not SUCCESS, block the merge.
            # If it was not found at all, also block as a safety measure.
            if [ "$BUILD_STATUS" != "SUCCESS" ]; then
              echo "  ‚õî PR #${PR_NUMBER}: build-and-test status is '${BUILD_STATUS:-not found}' ‚Äì skipping merge." \
                | tee -a "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # ‚îÄ‚îÄ 3d. Auto-review PRs that have no review yet ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            if [ -z "$REVIEW" ] || [ "$REVIEW" = "null" ]; then
              echo "  PR #${PR_NUMBER} has no review ‚Äì leaving automated review comment‚Ä¶"
              gh pr comment "$PR_NUMBER" \
                --repo "$REPO" \
                --body "ü§ñ Auto-pilot: All CI checks are passing. This PR is awaiting human review and approval before it can be merged." \
                2>/dev/null || true
              echo "  üìù PR #${PR_NUMBER}: review reminder comment added." \
                | tee -a "$GITHUB_STEP_SUMMARY"
              # Re-read the review decision after commenting
              REVIEW=$(gh pr view "$PR_NUMBER" \
                --repo "$REPO" \
                --json reviewDecision \
                --jq '.reviewDecision // empty' 2>/dev/null || true)
            fi

            # ‚îÄ‚îÄ 3e. Squash-merge if approved and all CI checks pass ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            # --auto queues the merge; GitHub completes it once all branch
            # protection rules are satisfied (consistent with issue requirements).
            if [ "$REVIEW" = "APPROVED" ]; then
              echo "  PR #${PR_NUMBER}: approved + CI passing ‚Äì queuing squash merge‚Ä¶"
              gh pr merge "$PR_NUMBER" \
                --repo "$REPO" \
                --squash \
                --auto \
                --delete-branch \
                2>/dev/null && \
                echo "  ‚úÖ PR #${PR_NUMBER}: squash merge queued." | tee -a "$GITHUB_STEP_SUMMARY" || \
                echo "  ‚öÝÔ∏è  PR #${PR_NUMBER}: merge failed (may already be merged or requires additional approvals)." \
                  | tee -a "$GITHUB_STEP_SUMMARY"
            else
              echo "  PR #${PR_NUMBER}: review='${REVIEW:-none}' ‚Äì not merging yet." \
                | tee -a "$GITHUB_STEP_SUMMARY"
            fi
          done

      # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # STEP 4 ‚Äì Verify main branch is still green
      # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Verify main branch health
        run: |
          echo "## Main branch health check" >> "$GITHUB_STEP_SUMMARY"

          # Fetch the latest CI run on main (any workflow)
          LATEST_RUN=$(gh run list \
            --repo "$REPO" \
            --branch main \
            --limit 1 \
            --json status,conclusion,url,name \
            --jq '.[0]' 2>/dev/null || echo '{}')

          STATUS=$(echo "$LATEST_RUN"     | jq -r '.status // "unknown"')
          CONCLUSION=$(echo "$LATEST_RUN" | jq -r '.conclusion // "unknown"')
          URL=$(echo "$LATEST_RUN"        | jq -r '.url // ""')
          NAME=$(echo "$LATEST_RUN"       | jq -r '.name // ""')

          echo "Main branch latest CI run: $NAME ‚Äì status=$STATUS conclusion=$CONCLUSION"

          if [ "$CONCLUSION" = "success" ]; then
            echo "‚úÖ Main branch is healthy ($NAME)." | tee -a "$GITHUB_STEP_SUMMARY"
          elif [ "$STATUS" = "in_progress" ] || [ "$STATUS" = "queued" ]; then
            echo "‚è≥ Main branch CI run '$NAME' is still in progress ‚Äì no action taken." \
              | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "‚öÝÔ∏è  Main branch CI conclusion: '$CONCLUSION' for '$NAME'. Review: $URL" \
              | tee -a "$GITHUB_STEP_SUMMARY"
          fi
